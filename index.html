<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Torre de Control
    </title>
    <style>
        body {
            font-family: sans-serif;
            background: #0F172A;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(
                auto-fit, minmax(250px, 1fr)
            );
            gap: 2rem;
            margin-top: 3rem;
            max-width: 900px;
        }
        .card {
            background: #1E293B;
            padding: 2rem;
            border-radius: 1rem;
            text-decoration: none;
            color: white;
            border: 2px solid #8B0000;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            background: #334155;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #94A3B8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            Torre de Control
        </h1>
        <p>
            Xavier Pallarès
        </p>
        <div class="grid">
            <a href="./BPMN-Modeler/" class="card">
                <h3>
                    BPMN Interactive Modeler
                </h3>
                <p>
                    Modulador de Procesos Interactivo
                </p>
            </a>
            <a href="./Shipment-Tracker/" class="card">
                <h3>
                    Shipment Tracker
                </h3>
                <p>
                    Seguimiento de Embarques
                </p>
            </a>
            <a href="./Logistics-Dashboard/" class="card">
                <h3>
                    Interactive Dashboard
                </h3>
                <p>
                    Panel de Control Interactivo
                </p>
            </a>
        </div>
    </div>
</body>
</html>
