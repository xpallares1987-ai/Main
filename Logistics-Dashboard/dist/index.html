<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self';">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(self)">
    <title>
        Interactive Dashboard
    </title>
    
  <script type="module" crossorigin src="./assets/index-Be4bpK7B.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-ZuCH54_D.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">
            <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" rx="14" fill="#E53E3E"/>
                <path d="M25 35H75V42H25V35ZM25 47H60V54H25V47ZM25 59H75V66H25V59Z" fill="white"/>
            </svg>
            <div>
                <h1>
                    Análisis Inteligente
                </h1>
                <span>
                    Proyecto Personal 
                </span>
            </div>
        </div>
        <div class="nav-status">
            <div class="status-dot"></div>
            Análisis Inteligente
        </div>
    </nav>

    <div class="container">
        <div class="upload-wrapper" id="uploadPanel">
            <label class="upload-section" for="excelInput">
                <div class="upload-icon">
                    <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                </div>
                <div>
                    <h3 style="color: var(--App-dark); font-size: 1.5rem; font-weight: 800; margin-bottom: 0.75rem;">
                        Importar Datos
                    </h3>
                    <p style="color: var(--App-gray); font-size: 1rem; max-width: 600px; margin: 0 auto;">
                        Cargar Excel. El sistema analizara y procesara un reporte.
                    </p>
                </div>
                <input type="file" id="excelInput" name="excelInput" accept=".xlsx, .xls, .csv">
                
                <div style="margin-top: 1rem;">
                    <button id="btnLoadSample" class="btn btn-secondary" type="button">
                        Cargar Datos de Ejemplo (Freight Forwarding)
                    </button>
                </div>
            </label>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <h2 style="color: var(--App-dark); font-weight: 800; margin-bottom: 0.5rem; font-size: 1.5rem;">
                Procesando Analítica...
            </h2>
            <p style="color: var(--App-gray); font-size: 1rem; font-weight: 500;">
                Validando estructura...
            </p>
        </div>

        <div id="dashboardUI" style="display: none;">
            
            <div class="control-panel">
                <div class="control-header">
                    <h3>
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path>
                        </svg>
                        Parámetros de Auditoría
                    </h3>
                    <div style="display: flex; gap: 1.25rem; align-items: center; flex-wrap: wrap;">
                        <div style="display: flex; align-items: center; gap: 0.5rem; background: var(--App-gray-light); padding: 0.25rem 0.5rem 0.25rem 1rem; border-radius: 12px; border: 1px solid var(--border);">
                            <span style="font-size: 0.8rem; font-weight: 700; color: var(--App-gray);">
                                VISTA ACTIVA:
                            </span>
                            <select id="sheetSelect" name="sheetSelect" style="font-weight: 800; border: none; background: transparent; color: var(--App-red); padding-left: 0.5rem; cursor: pointer;"></select>
                        </div>
                        <button class="btn btn-secondary" id="btnReset" type="button">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                            Restablecer
                        </button>
                        <button class="btn btn-primary" id="btnApply" type="button">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
                            </svg>
                            Actualizar
                        </button>
                    </div>
                </div>
                <div id="filterGrid" class="filter-grid"></div>
                <div id="activeFilters" class="active-filters-container" style="display: none;"></div>
            </div>

            <div class="ai-panel">
                <div class="ai-icon-wrap">
                    <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <div class="ai-content" id="aiPanel">
                    <h4>
                        Análisis Inteligente
                    </h4>
                    <div id="aiSummary">
                        Interpretando datos...
                    </div>
                </div>
            </div>

            <div class="kpi-grid" id="kpiContainer"></div>

            <div class="tab-container">
                <div class="tab-bar">
                    <button class="tab-btn active" id="tabChartsBtn" type="button">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path>
                        </svg>
                        Dashboard Visual
                    </button>
                    <button class="tab-btn" id="tabDataBtn" type="button">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                        </svg>
                        Registro Integral
                    </button>
                </div>
            </div>

            <div id="tab-charts" class="tab-pane active">
                <div class="dynamic-grid" id="chartsGrid">
                </div>
                
                <div class="card chart-card" id="cardChart5" style="display:none; grid-column: 1 / -1; margin-top: 2rem;">
                    <div class="chart-header">
                        <h3 class="chart-title">
                            <svg width="24" height="24" fill="none" stroke="var(--App-red)" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                            </svg>
                            Análisis Avanzado
                        </h3>
                        <div class="chart-controls">
                            <select id="c5X" name="c5X" style="border: 1px solid var(--border);"></select>
                        </div>
                    </div>
                    <div class="chart-wrapper" style="min-height: 450px;">
                        <canvas id="chart5"></canvas>
                    </div>
                </div>
            </div>

            <div id="tab-data" class="tab-pane">
                <div class="data-table-container">
                    <div class="table-toolbar">
                        <div style="position: relative; width: 100%; max-width: 400px;">
                            <svg width="18" height="18" fill="none" stroke="var(--App-gray)" stroke-width="2" viewBox="0 0 24 24" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                            <input type="text" id="tableSearch" name="tableSearch" class="input-base" style="width: 100%; padding-left: 2.5rem;" placeholder="Búsqueda en registros de tabla..." autocomplete="off">
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table id="dataTable">
                            <thead id="dtHead"></thead>
                            <tbody id="dtBody"></tbody>
                        </table>
                    </div>
                    <div class="pagination-bar">
                        <span id="pageLabel" style="font-weight: 700; color: var(--App-gray); font-size: 0.9rem;">
                            Paginación
                        </span>
                        <div style="display: flex; gap: 0.75rem;">
                            <button class="btn btn-secondary" id="btnPrev" type="button">
                                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
                                </svg>
                                Anterior
                            </button>
                            <button class="btn btn-secondary" id="btnNext" type="button">
                                Siguiente
                                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
</body>
</html>
