name: Gemini Intelligence Audit

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

permissions:
  contents: read
  pull-requests: write

jobs:
  gemini-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0.1.22
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          command: |
            Realiza una auditoría de inteligencia artificial sobre los últimos cambios en el código. 
            Prioridad:
            1. Anonimización: Verifica que no existan nombres de clientes o marcas específicas (mantener términos genéricos).
            2. Calidad: Evalúa el uso de tipos en TypeScript y la estructura del monorepo.
            3. Rendimiento: Sugiere optimizaciones para el procesamiento de XML en Logistics-Dashboard.
          include: "Logistics-Dashboard/src/**,packages/shared/src/**"
          model: "gemini-1.5-pro"
