name: Gemini Intelligence Audit

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Permite ejecutarlo manualmente

permissions:
  contents: read
  pull-requests: write

jobs:
  gemini-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini CLI Audit
        uses: google/gemini-cli-action@v1
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          command: |
            Audita los últimos cambios realizados. Enfócate en:
            1. Asegurar que no existan referencias a marcas externas (mantenimiento de anonimización).
            2. Verificar la integridad de los tipos de TypeScript en el monorepo.
            3. Sugerir mejoras de performance en el procesamiento de XML en el Logistics-Dashboard.
          include: |
            Logistics-Dashboard/src/**
            packages/shared/src/**
          model: "gemini-1.5-pro"
