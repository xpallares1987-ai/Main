name: Multi-Project Deployment

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      bpmn: ${{ steps.filter.outputs.bpmn }}
      tracker: ${{ steps.filter.outputs.tracker }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bpmn:
              - 'BPMN-Modeler/**'
            tracker:
              - 'Shipment-Tracker/**'
            dashboard:
              - 'Logistics-Dashboard/**'
            shared:
              - 'packages/shared/**'

  build-all:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare Out Dir
        run: mkdir -p out

      # Build Shared if changed or if any consumer needs a build
      - name: Build Shared Package
        if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.bpmn == 'true' || needs.changes.outputs.tracker == 'true'
        run: npx turbo run build --filter=@repo/shared

      # Build BPMN Modeler
      - name: Build BPMN Modeler
        if: needs.changes.outputs.bpmn == 'true' || needs.changes.outputs.shared == 'true'
        run: |
          npx turbo run build --filter=bpmn-modeler
          mkdir -p out/BPMN-Modeler
          cp -r BPMN-Modeler/dist/* out/BPMN-Modeler/

      # Build Shipment Tracker
      - name: Build Shipment Tracker
        if: needs.changes.outputs.tracker == 'true' || needs.changes.outputs.shared == 'true'
        run: |
          npx turbo run build --filter=shipment-tracker
          mkdir -p out/Shipment-Tracker
          cp -r Shipment-Tracker/dist/* out/Shipment-Tracker/

      # Build Logistics Dashboard
      - name: Build Logistics Dashboard
        if: needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.shared == 'true'
        run: |
          npx turbo run build --filter=logistics-dashboard
          mkdir -p out/Logistics-Dashboard
          cp -r Logistics-Dashboard/out/* out/Logistics-Dashboard/

      - name: Copy Root Index
        run: cp index.html out/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
