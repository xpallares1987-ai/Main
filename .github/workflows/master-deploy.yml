name: Multi-Project Deployment

on:
  push:
    branches: [ main ]

# Cancelar ejecuciones en curso si se pushea algo nuevo a la misma rama
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Única instalación para todo el Monorepo
      - name: Install dependencies (Monorepo)
        run: npm install --legacy-peer-deps

      - name: Prepare Out Dir
        run: mkdir -p out

      # BUILD All projects using Turbo (handles dependency graph)
      - name: Build All
        run: npx turbo build

      # ASSEMBLE Out Dir
      - name: Assemble Out Dir
        run: |
          mkdir -p out/BPMN-Modeler
          cp -r BPMN-Modeler/dist/* out/BPMN-Modeler/
          mkdir -p out/Shipment-Tracker
          cp -r Shipment-Tracker/dist/* out/Shipment-Tracker/
          mkdir -p out/Logistics-Dashboard
          cp -r Logistics-Dashboard/dist/* out/Logistics-Dashboard/
          cp index.html out/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
