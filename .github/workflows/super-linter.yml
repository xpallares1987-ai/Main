name: Global Standards Audit

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Full git history is needed to get a proper list of changed files within `super-linter`
          fetch-depth: 0

      - name: Lint Code Base
        uses: super-linter/super-linter@v7
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Especificamos qué queremos validar para no saturar el proceso
          VALIDATE_TYPESCRIPT_ESLINT: true
          VALIDATE_XML: true
          VALIDATE_MARKDOWN: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_JSON: true
          # Evitamos que un aviso de estilo bloquee el merge si no es crítico
          DISABLE_ERRORS: false 
