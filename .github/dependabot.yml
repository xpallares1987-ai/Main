version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"https://github.com/xpallares1987-ai/Control-Tower/blob/main/.github/dependabot.yml
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "javascript"

  # Actualizaciones para GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci/cd"
